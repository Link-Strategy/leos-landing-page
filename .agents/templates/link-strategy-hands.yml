name: Link Strategy Hands Guardian

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

defaults:
  run:
    shell: bash

jobs:
  verification-gate:
    name: verification-gate (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Pub packages
        if: hashFiles('pubspec.yaml') != ''
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Flutter
        if: hashFiles('pubspec.yaml') != ''
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Smart Flutter/Dart Install
        if: hashFiles('pubspec.yaml') != ''
        run: |
          if grep -q "sdk: flutter" pubspec.yaml; then
            flutter pub get
          else
            dart pub get
          fi

      - name: Smart Dependency Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            # Only install if there are actual dependencies or devDependencies
            node -e "const p=require('./package.json'); if (Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0) process.exit(0); else process.exit(1);" && npm install || echo "No Node dependencies found, skipping npm install."
          fi

      - name: "[STRICT] Technical Verify Gate"
        run: node .agents/tools/ls-engine/cli.mjs verify-gate

      - name: "[STRICT] Enforce Delivery Receipt"
        run: node .agents/tools/ls-engine/cli.mjs verify-delivery

      - name: "Upload Gate Report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-report
          path: |
            report/GATE_REPORT.md
            report/gate-manifest.json
            report/delivery-receipt.json
